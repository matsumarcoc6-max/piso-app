<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="theme-color" content="#1a1a1a">
    <title>PISOA Study - Segurança Operacional</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f0;
            color: #1a1a1a;
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }
        body.dark {
            background: #121212;
            color: #e0e0e0;
        }
        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-top: 8px;
        }
        .logo h1 {
            font-size: 1.6rem;
            font-weight: 600;
        }
        .logo p {
            font-size: 0.7rem;
            color: #666;
            margin-top: 4px;
        }
        body.dark .logo p {
            color: #aaa;
        }
        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
        }
        .btn {
            width: 100%;
            padding: 16px 24px;
            margin: 10px 0;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            background: #1a1a1a;
            color: white;
        }
        body.dark .btn {
            background: #2a2a2a;
        }
        .btn-secondary {
            background: transparent;
            border: 1.5px solid #1a1a1a;
            color: #1a1a1a;
        }
        body.dark .btn-secondary {
            border-color: #e0e0e0;
            color: #e0e0e0;
        }
        .home-screen, .quiz-screen, .result-screen, .subjects-screen {
            display: none;
        }
        .home-screen {
            flex-direction: column;
            justify-content: center;
            min-height: 60vh;
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #ddd;
        }
        body.dark .quiz-header {
            border-bottom-color: #333;
        }
        .progress {
            font-size: 0.8rem;
            color: #666;
            background: #e8e8e8;
            padding: 4px 12px;
            border-radius: 20px;
        }
        body.dark .progress {
            background: #2a2a2a;
            color: #aaa;
        }
        .question-text {
            font-size: 1.2rem;
            line-height: 1.4;
            margin-bottom: 24px;
            font-weight: 500;
        }
        .option {
            background: white;
            border: 1px solid #ddd;
            border-radius: 14px;
            padding: 14px 16px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }
        body.dark .option {
            background: #1e1e1e;
            border-color: #333;
        }
        .option.correct {
            border-color: #2e7d32;
            background: #e8f5e9;
        }
        body.dark .option.correct {
            background: #1b3a1f;
            border-color: #4caf50;
        }
        .option.wrong {
            border-color: #c62828;
            background: #ffebee;
        }
        body.dark .option.wrong {
            background: #3a1a1a;
            border-color: #ef5350;
        }
        .feedback {
            margin: 20px 0;
            padding: 16px;
            border-radius: 14px;
            background: #f0f0f0;
        }
        body.dark .feedback {
            background: #1e1e1e;
        }
        .feedback-correct {
            color: #2e7d32;
            font-weight: 600;
            margin-bottom: 8px;
        }
        body.dark .feedback-correct {
            color: #81c784;
        }
        .feedback-explanation {
            color: #555;
            font-size: 0.85rem;
        }
        body.dark .feedback-explanation {
            color: #bbb;
        }
        .next-btn {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            background: #1a1a1a;
            color: white;
            cursor: pointer;
        }
        .result-card {
            text-align: center;
            padding: 30px 16px;
        }
        .score {
            font-size: 3rem;
            font-weight: 700;
            margin: 20px 0;
        }
        .percentage {
            font-size: 1.2rem;
            color: #666;
        }
        .time-spent {
            margin: 20px 0;
            padding: 14px;
            background: #f0f0f0;
            border-radius: 14px;
        }
        body.dark .time-spent {
            background: #1e1e1e;
        }
        .subject-btn {
            width: 100%;
            padding: 14px 16px;
            margin: 8px 0;
            text-align: left;
            background: white;
            border: 1px solid #ddd;
            border-radius: 14px;
            cursor: pointer;
        }
        body.dark .subject-btn {
            background: #1e1e1e;
            border-color: #333;
            color: #e0e0e0;
        }
        .back-btn {
            background: none;
            border: none;
            font-size: 0.95rem;
            cursor: pointer;
            margin-bottom: 20px;
            padding: 8px 0;
            color: #666;
        }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #ddd;
        }
        body.dark hr {
            border-top-color: #333;
        }
        h3 {
            margin-bottom: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>✈️ PISOA</h1>
                <p>Programa de Instrução em Segurança Operacional</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
        </div>

        <div id="homeScreen" class="home-screen">
            <button class="btn" onclick="startQuiz()">▶ Iniciar Quiz</button>
            <button class="btn btn-secondary" onclick="showSubjects()">📚 Estudar por Assunto</button>
            <button class="btn btn-secondary" onclick="showResultsHistory()">📊 Resultados</button>
        </div>

        <div id="quizScreen" class="quiz-screen">
            <div class="quiz-header">
                <span class="progress" id="quizProgress">Questão 0/0</span>
                <span class="progress" id="quizTimer">00:00</span>
            </div>
            <div class="question-text" id="questionText"></div>
            <div id="optionsContainer"></div>
            <div id="feedbackContainer" class="feedback" style="display: none;"></div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()" style="display: none;">Próxima →</button>
            <button class="next-btn" id="finishBtn" onclick="finishQuiz()" style="display: none;">🏁 Finalizar</button>
        </div>

        <div id="subjectsScreen" class="subjects-screen">
            <button class="back-btn" onclick="showHome()">← Voltar</button>
            <h3>📖 Escolha um tema</h3>
            <div id="subjectsList"></div>
        </div>

        <div id="resultScreen" class="quiz-screen">
            <button class="back-btn" onclick="showHome()">← Voltar</button>
            <div class="result-card">
                <h2>📊 Seu resultado</h2>
                <div class="score" id="finalScore">0/0</div>
                <div class="percentage" id="finalPercent">0%</div>
                <div class="time-spent">
                    ⏱️ Tempo: <span id="finalTime">00:00</span>
                </div>
                <hr>
                <button class="btn" onclick="startQuiz()">🔄 Novo Quiz</button>
                <button class="btn btn-secondary" onclick="showHome()">🏠 Início</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            { text: "Quantos treinamentos obrigatórios são listados na Seção 153.37 do RBAC nº 153?", options: ["5", "7", "9", "11"], correct: 2, explanation: "A Seção 153.37 lista 9 treinamentos obrigatórios." },
            { text: "Qual o objetivo principal do PISOA?", options: ["Cumprir exigência regulatória", "Estabelecer treinamentos para garantir segurança operacional", "Substituir o SGSO", "Treinar apenas bombeiros"], correct: 1, explanation: "O PISOA estabelece treinamentos para segurança operacional." },
            { text: "Por quantos anos o operador deve manter a documentação do PISOA?", options: ["2 anos", "3 anos", "5 anos", "10 anos"], correct: 2, explanation: "A documentação deve ser mantida por pelo menos 5 anos." },
            { text: "Qual o prazo máximo recomendado para treinamentos recorrentes?", options: ["12 meses", "18 meses", "24 meses", "36 meses"], correct: 2, explanation: "Recomenda-se intervalo máximo de 24 meses." },
            { text: "O que significa SGSO?", options: ["Sistema de Gestão de Segurança Operacional", "Sistema Geral de Segurança Operacional", "Sistema de Gerenciamento da Segurança Operacional", "Sistema de Garantia da Segurança Operacional"], correct: 2, explanation: "SGSO = Sistema de Gerenciamento da Segurança Operacional." }
        ];

        let currentQuestions = [];
        let currentIndex = 0;
        let userAnswers = [];
        let quizStartTime = null;
        let quizTimerInterval = null;
        let answerLocked = false;

        function toggleTheme() {
            document.body.classList.toggle('dark');
        }

        function showHome() {
            document.getElementById('homeScreen').style.display = 'flex';
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('subjectsScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            if (quizTimerInterval) clearInterval(quizTimerInterval);
        }

        function showSubjects() {
            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('subjectsScreen').style.display = 'block';
            const container = document.getElementById('subjectsList');
            container.innerHTML = '';
            const subjects = [
                { name: "📋 Todas as questões", filter: () => true }
            ];
            subjects.forEach(sub => {
                const btn = document.createElement('button');
                btn.className = 'subject-btn';
                btn.textContent = sub.name;
                btn.onclick = () => startQuizBySubject(sub.filter);
                container.appendChild(btn);
            });
        }

        function startQuizBySubject(filter) {
            const filtered = questions.filter(filter);
            const quizSize = Math.min(40, filtered.length);
            currentQuestions = shuffleArray([...filtered]).slice(0, quizSize);
            initializeQuiz();
        }

        function startQuiz() {
            const quizSize = Math.min(40, questions.length);
            currentQuestions = shuffleArray([...questions]).slice(0, quizSize);
            initializeQuiz();
        }

        function initializeQuiz() {
            currentIndex = 0;
            userAnswers = [];
            answerLocked = false;
            quizStartTime = Date.now();
            if (quizTimerInterval) clearInterval(quizTimerInterval);
            quizTimerInterval = setInterval(updateTimer, 1000);
            document.getElementById('homeScreen').style.display = 'none';
            document.getElementById('quizScreen').style.display = 'block';
            renderQuestion();
        }

        function updateTimer() {
            if (!quizStartTime) return;
            const elapsed = Math.floor((Date.now() - quizStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('quizTimer').textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
        }

        function renderQuestion() {
            const q = currentQuestions[currentIndex];
            document.getElementById('quizProgress').textContent = `Questão ${currentIndex + 1}/${currentQuestions.length}`;
            document.getElementById('questionText').textContent = q.text;
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            q.options.forEach((opt, idx) => {
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = `${String.fromCharCode(65+idx)}. ${opt}`;
                div.onclick = () => selectOption(idx);
                container.appendChild(div);
            });
            document.getElementById('feedbackContainer').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('finishBtn').style.display = 'none';
            answerLocked = false;
        }

        function selectOption(optionIndex) {
            if (answerLocked) return;
            const q = currentQuestions[currentIndex];
            const isCorrect = (optionIndex === q.correct);
            userAnswers[currentIndex] = {
                selected: optionIndex,
                correct: isCorrect,
                question: q
            };
            answerLocked = true;
            const options = document.querySelectorAll('.option');
            options.forEach((opt, idx) => {
                if (idx === q.correct) opt.classList.add('correct');
                if (idx === optionIndex && !isCorrect) opt.classList.add('wrong');
                opt.style.pointerEvents = 'none';
            });
            const feedbackDiv = document.getElementById('feedbackContainer');
            const correctText = isCorrect ? '✅ Resposta correta!' : '❌ Resposta incorreta';
            feedbackDiv.innerHTML = `<div class="feedback-correct">${correctText}</div><div class="feedback-explanation">📘 Explicação: ${q.explanation}</div>`;
            feedbackDiv.style.display = 'block';
            if (currentIndex + 1 === currentQuestions.length) {
                document.getElementById('finishBtn').style.display = 'block';
            } else {
                document.getElementById('nextBtn').style.display = 'block';
            }
        }

        function nextQuestion() {
            currentIndex++;
            renderQuestion();
        }

        function finishQuiz() {
            if (quizTimerInterval) clearInterval(quizTimerInterval);
            const totalQuestions = currentQuestions.length;
            const correctCount = userAnswers.filter(a => a && a.correct).length;
            const percentage = Math.round((correctCount / totalQuestions) * 100);
            const elapsed = Math.floor((Date.now() - quizStartTime) / 1000);
            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            document.getElementById('finalScore').textContent = `${correctCount}/${totalQuestions}`;
            document.getElementById('finalPercent').textContent = `${percentage}%`;
            document.getElementById('finalTime').textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
            document.getElementById('quizScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            saveResult(correctCount, totalQuestions, percentage, `${minutes}:${seconds}`);
        }

        function saveResult(score, total, percent, time) {
            const history = getResultsHistory();
            history.unshift({ date: new Date().toLocaleString(), score, total, percent, time });
            while (history.length > 20) history.pop();
            localStorage.setItem('piso_quiz_history', JSON.stringify(history));
        }

        function getResultsHistory() {
            const stored = localStorage.getItem('piso_quiz_history');
            return stored ? JSON.parse(stored) : [];
        }

        function showResultsHistory() {
            const history = getResultsHistory();
            if (history.length === 0) {
                alert("Nenhum resultado salvo ainda. Faça um quiz primeiro!");
                return;
            }
            let msg = "📊 SEUS ÚLTIMOS RESULTADOS:\n\n";
            history.forEach((r, i) => {
                msg += `${i+1}. ${r.date}\n   ${r.score}/${r.total} (${r.percent}%) - ⏱️ ${r.time}\n\n`;
            });
            alert(msg);
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        showHome();
    </script>
</body>
</html>
